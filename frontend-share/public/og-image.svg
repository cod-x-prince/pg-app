<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep navy gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0F2347"/>
      <stop offset="60%"  stop-color="#1B3B6F"/>
      <stop offset="100%" stop-color="#0F2347"/>
    </linearGradient>
    <!-- Amber glow -->
    <radialGradient id="glow1" cx="75%" cy="25%" r="40%">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="35%">
      <stop offset="0%"   stop-color="#254E99" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#254E99" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <!-- Clip path for right panel -->
    <clipPath id="rightClip">
      <polygon points="580,0 1200,0 1200,630 520,630"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Diagonal accent shape -->
  <polygon points="680,0 1200,0 1200,630 580,630" fill="rgba(255,255,255,0.02)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="120"  r="180" fill="none" stroke="rgba(245,158,11,0.08)" stroke-width="1"/>
  <circle cx="950" cy="120"  r="120" fill="none" stroke="rgba(245,158,11,0.06)" stroke-width="1"/>
  <circle cx="950" cy="120"  r="60"  fill="none" stroke="rgba(245,158,11,0.12)" stroke-width="1"/>
  <circle cx="200" cy="520"  r="140" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Left content -->
  <!-- Logo mark -->
  <rect x="72" y="72" width="52" height="52" rx="14" fill="#F59E0B"/>
  <text x="98" y="106" font-family="Georgia, serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">PG</text>

  <!-- Brand name -->
  <text x="138" y="108" font-family="Georgia, serif" font-size="28" font-weight="600" fill="white" letter-spacing="-0.5">PGLife</text>

  <!-- Divider line -->
  <line x1="72" y1="160" x2="200" y2="160" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>

  <!-- Main headline -->
  <text x="72" y="240" font-family="Georgia, serif" font-size="62" font-weight="700" fill="white" letter-spacing="-1">Find Your</text>
  <text x="72" y="318" font-family="Georgia, serif" font-size="62" font-weight="700" font-style="italic" fill="#F59E0B" letter-spacing="-1">Perfect Home</text>
  <text x="72" y="396" font-family="Georgia, serif" font-size="62" font-weight="700" fill="white" letter-spacing="-1">Away from Home</text>

  <!-- Subtitle -->
  <text x="72" y="450" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">
    Verified PGs · Real Photos · Zero Broker Fees
  </text>

  <!-- Stats row -->
  <rect x="72" y="490" width="130" height="70" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="137" y="522" font-family="Georgia, serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">7+</text>
  <text x="137" y="544" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">VERIFIED PGS</text>

  <rect x="216" y="490" width="130" height="70" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="281" y="522" font-family="Georgia, serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">5+</text>
  <text x="281" y="544" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">CITIES</text>

  <rect x="360" y="490" width="130" height="70" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="425" y="522" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#F59E0B" text-anchor="middle">4.8★</text>
  <text x="425" y="544" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">AVG RATING</text>

  <!-- Right side — floating PG cards mockup -->
  <!-- Card 1 -->
  <rect x="680" y="80" width="220" height="260" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="680" y="80" width="220" height="150" rx="20" fill="rgba(255,255,255,0.05)"/>
  <!-- Card image placeholder -->
  <rect x="680" y="80" width="220" height="150" rx="20" fill="rgba(27,59,111,0.4)"/>
  <rect x="688" y="88" width="204" height="134" rx="14" fill="rgba(255,255,255,0.04)"/>
  <!-- Price badge -->
  <rect x="848" y="196" width="88" height="28" rx="8" fill="#1B3B6F"/>
  <text x="892" y="214" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">₹8,000/mo</text>
  <!-- Verified badge -->
  <rect x="692" y="196" width="70" height="22" rx="6" fill="rgba(255,255,255,0.9)"/>
  <text x="727" y="211" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#059669" text-anchor="middle">✓ Verified</text>
  <!-- Card text -->
  <text x="700" y="258" font-family="Georgia, serif" font-size="15" font-weight="600" fill="white">Sunrise Girls PG</text>
  <text x="700" y="278" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Koramangala, Bangalore</text>
  <!-- Rating -->
  <text x="700" y="316" font-family="Arial, sans-serif" font-size="13" fill="#F59E0B">★★★★★</text>
  <text x="770" y="316" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">5.0 · 12 reviews</text>

  <!-- Card 2 (offset) -->
  <rect x="920" y="180" width="220" height="260" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="920" y="180" width="220" height="150" rx="20" fill="rgba(27,59,111,0.4)"/>
  <rect x="928" y="188" width="204" height="134" rx="14" fill="rgba(255,255,255,0.04)"/>
  <rect x="1088" y="296" width="88" height="28" rx="8" fill="#1B3B6F"/>
  <text x="1132" y="314" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">₹12,000/mo</text>
  <rect x="932" y="296" width="70" height="22" rx="6" fill="rgba(255,255,255,0.9)"/>
  <text x="967" y="311" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#059669" text-anchor="middle">✓ Verified</text>
  <text x="940" y="358" font-family="Georgia, serif" font-size="15" font-weight="600" fill="white">Tech Hub PG</text>
  <text x="940" y="378" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Indiranagar, Bangalore</text>
  <text x="940" y="416" font-family="Arial, sans-serif" font-size="13" fill="#F59E0B">★★★★★</text>
  <text x="1010" y="416" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">4.9 · 8 reviews</text>

  <!-- Card 3 (bottom left of right panel) -->
  <rect x="720" y="370" width="180" height="200" rx="20" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <text x="810" y="440" font-family="Georgia, serif" font-size="32" font-weight="700" fill="rgba(245,158,11,0.3)" text-anchor="middle">PG</text>
  <text x="810" y="480" font-family="Georgia, serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">Shiv Niwas PG</text>
  <text x="810" y="498" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle">Gandhi Nagar, Jammu</text>
  <rect x="750" y="516" width="120" height="24" rx="8" fill="rgba(27,59,111,0.5)"/>
  <text x="810" y="532" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">₹4,000/mo</text>

  <!-- Bottom URL -->
  <text x="72" y="600" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.25)" letter-spacing="1">pglife.in</text>

  <!-- Amber accent dot -->
  <circle cx="55" cy="597" r="4" fill="#F59E0B"/>
</svg>